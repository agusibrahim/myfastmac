name: Interactive Armbian Builder
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup Build Environment (Ubuntu 20.04 via Docker)
        run: |
          # Kita siapkan script pembantu agar build berjalan di dalam 'lingkungan' 20.04
          cat <<EOF > build_script.sh
          apt-get update && apt-get install -y curl build-essential pkg-config libssl-dev perl make
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source \$HOME/.cargo/env
          export ORT_STRATEGY=download
          EOF

      - name: 🚀 Start sshx for Debugging
        uses: sshx-gg/sshx-action@v1
        # sshx akan memberikan URL di logs. Anda bisa masuk ke sini 
        # dan menjalankan kompilasi secara interaktif.

      - name: 🏗️ Instructions for Manual Build (Interaktif)
        run: |
          echo "SAAT ANDA DI DALAM SSHX, JALANKAN INI:"
          echo "docker run --rm -it -v \$(pwd):/app -w /app ubuntu:20.04 /bin/bash"
          echo "Lalu di dalam docker, jalankan: ./build_script.sh"
